# 로컬 개발용 PostgreSQL + pgvector
# 사용법: sudo docker compose -f docker-compose.local.yml up -d

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: vapmortarwiki-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5433:5432"
    environment:
      POSTGRES_DB: vapmortarwiki
      POSTGRES_USER: vapmwiki
      POSTGRES_PASSWORD: vapmwiki1234
    volumes:
      - vapmwiki_pgdata:/var/lib/postgresql/data
      - ./docker/initdb:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vapmwiki -d vapmortarwiki"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  vapmwiki_pgdata:
